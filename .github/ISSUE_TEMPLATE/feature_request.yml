name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Ideas are welcome! The best features solve real problems for AI agents and CLI users.
  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered?
  - type: checkboxes
    id: willingness
    attributes:
      label: Willingness to Implement
      options:
        - label: I am willing to implement this feature
        - label: I can help test a PR for this feature
